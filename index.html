<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="The English Codex is a free, static study companion for building a handwritten English notebook from A0 to C2." />
  <title>The English Codex · Handwritten Study Companion</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/codex.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <button class="btn mobile-toggle" id="menuBtn" type="button">Menu</button>
      <div class="brand-mark" aria-hidden="true">ELC</div>
      <div>
        <div class="brand-title">The English Codex</div>
        <div class="brand-sub">A0 → C2 · Handwritten Codex System · Cambridge Companion</div>
      </div>
      <div class="top-actions">
        <button class="btn" id="copyModeBtn" type="button">Copy Mode</button>
        <button class="btn" id="printBtn" type="button">Print Page</button>
        <button class="btn primary" id="doneBtn" type="button">Mark Done</button>
      </div>
    </header>

    <aside class="sidebar" id="sidebar">
      <input class="searchbox" id="search" placeholder="Search grammar, level, skill..." aria-label="Search pages" />
      <div class="filters" id="filters" aria-label="Level filters"></div>
      <div class="progress-card" aria-label="Study progress">
        <div class="progress-line"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">0% complete</div>
      </div>
      <nav id="nav" aria-label="Codex pages"></nav>
    </aside>

    <main class="main">
      <article class="article" id="article">
        <p class="status-message">Loading The English Codex...</p>
      </article>
      <div class="footer-note">
        Built as a public, handwritten-codex-first English companion. Use official Cambridge pages before booking exams.
      </div>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
